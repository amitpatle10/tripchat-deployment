spring:
  jpa:
    hibernate:
      # update: Hibernate syncs schema changes without dropping data.
      # Safer than create-drop (which wipes data on restart).
      # Never use in production — use validate there.
      ddl-auto: update
    show-sql: true

logging:
  level:
    com.tripchat: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE  # logs actual SQL parameter values
