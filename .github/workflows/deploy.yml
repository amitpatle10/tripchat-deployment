name: Deploy TripChat

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: tripchat-backend
  ECS_CLUSTER: tripchat
  ECS_SERVICE: tripchat-backend
  S3_BUCKET: tripchat-frontend-010741811423

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  # Builds the Spring Boot Docker image, pushes it to ECR, then forces ECS to
  # pull the new image by triggering a new deployment on the service.
  deploy-backend:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest
    environment: Prod
    permissions:
      id-token: write   # required for OIDC token exchange
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # OIDC authentication — no long-lived AWS keys stored in GitHub secrets.
      # AWS_DEPLOY_ROLE_ARN must be set in repo secrets; the IAM role's trust
      # policy must allow the token.actions.githubusercontent.com OIDC provider
      # for this repo and branch.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Tag with both the git SHA (immutable, audit trail) and "latest"
      # (ECS task definition can always reference :latest for simplicity).
      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            ./backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # ECS picks up the new :latest image on the next task replacement.
      # --force-new-deployment drains and replaces the running task immediately.
      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment

  # ── Frontend ───────────────────────────────────────────────────────────────
  # Builds the Vite React app with the production env file, syncs the output to
  # S3, then invalidates the CloudFront cache so users get the new version
  # without waiting for the CDN TTL to expire.
  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    environment: Prod
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # Vite reads .env.production automatically when NODE_ENV=production.
      # VITE_API_BASE_URL is baked into the JS bundle at build time.
      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # --delete removes files from S3 that no longer exist in the build output,
      # preventing stale assets from being served.
      - name: Sync build output to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ env.S3_BUCKET }} --delete

      # Invalidate all paths so CloudFront fetches the latest files from S3.
      # CLOUDFRONT_DISTRIBUTION_ID must be set in repo secrets.
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
