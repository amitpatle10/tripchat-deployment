<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TripChat — Join Group</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 h-screen flex overflow-hidden font-sans text-sm">

  <!-- ─── BACKGROUND (dimmed) ──────────────────────────────────────── -->
  <aside class="w-72 bg-gray-900 border-r border-gray-800 flex flex-col shrink-0 opacity-40 pointer-events-none select-none">
    <div class="px-4 py-4 border-b border-gray-800 flex items-center gap-2">
      <div class="w-7 h-7 rounded-lg bg-indigo-600 flex items-center justify-center">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
        </svg>
      </div>
      <span class="text-white font-semibold">TripChat</span>
    </div>
    <div class="px-4 py-3"><span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Your groups</span></div>
    <nav class="flex-1 px-2 space-y-0.5">
      <div class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl bg-gray-800">
        <div class="w-9 h-9 rounded-xl bg-indigo-500 flex items-center justify-center text-white font-semibold shrink-0">P</div>
        <div class="flex-1 min-w-0">
          <p class="text-white font-medium truncate">Paris Trip 2025</p>
          <p class="text-gray-400 text-xs truncate">Alice: See you at the Louvre!</p>
        </div>
      </div>
    </nav>
  </aside>
  <main class="flex-1 bg-gray-950 opacity-40 pointer-events-none select-none"></main>

  <!-- ─── MODAL ─────────────────────────────────────────────────────── -->
  <div class="absolute inset-0 bg-black/60 flex items-center justify-center z-10 p-4">
    <div class="bg-gray-900 border border-gray-800 rounded-2xl w-full max-w-md shadow-2xl">

      <!-- Header -->
      <div class="flex items-center justify-between px-6 py-5 border-b border-gray-800">
        <h2 class="text-white font-semibold text-base">Join a group</h2>
        <button class="w-7 h-7 rounded-lg text-gray-400 hover:text-white hover:bg-gray-800 flex items-center justify-center transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <!-- Form -->
      <form class="px-6 py-5 space-y-4">

        <!-- Invite code -->
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1.5">Invite code <span class="text-red-400">*</span></label>
          <input
            type="text"
            placeholder="AB12CD34"
            maxlength="8"
            class="w-full bg-gray-800 border border-gray-700 text-white placeholder-gray-500 rounded-lg px-4 py-2.5 text-sm font-mono tracking-widest uppercase focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition text-center text-base"
          />
          <p class="text-gray-500 text-xs mt-1 text-center">8-character code — ask the group admin for this</p>
        </div>

        <!-- Error: invalid code (404) -->
        <div class="flex items-center gap-2 bg-red-500/10 border border-red-500/20 rounded-lg px-3 py-2.5">
          <svg class="w-4 h-4 text-red-400 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" />
          </svg>
          <p class="text-red-400 text-sm">Invalid invite code. Check and try again.</p>
        </div>

        <!-- Error: already a member (409) — hidden by default -->
        <div class="flex items-center gap-2 bg-amber-500/10 border border-amber-500/20 rounded-lg px-3 py-2.5 hidden">
          <svg class="w-4 h-4 text-amber-400 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <p class="text-amber-400 text-sm">You're already a member of this group.</p>
        </div>

        <!-- Actions -->
        <div class="flex items-center gap-3 pt-1">
          <button type="button" class="flex-1 bg-gray-800 hover:bg-gray-700 text-gray-300 font-medium rounded-lg py-2.5 text-sm transition">
            Cancel
          </button>
          <button type="submit" class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white font-medium rounded-lg py-2.5 text-sm transition">
            Join group
          </button>
        </div>

      </form>

    </div>
  </div>

</body>
</html>
