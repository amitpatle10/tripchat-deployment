<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TripChat — Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 min-h-screen flex items-center justify-center font-sans py-10">

  <div class="w-full max-w-sm px-4">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-12 h-12 rounded-2xl bg-indigo-600 mb-4">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">TripChat</h1>
      <p class="text-gray-400 text-sm mt-1">Plan trips with your group</p>
    </div>

    <!-- Card -->
    <div class="bg-gray-900 rounded-2xl p-8 border border-gray-800">

      <h2 class="text-lg font-semibold text-white mb-6">Create your account</h2>

      <form class="space-y-4">

        <!-- Display Name -->
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1.5">Display name</label>
          <input
            type="text"
            placeholder="Alice"
            class="w-full bg-gray-800 border border-gray-700 text-white placeholder-gray-500 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
          />
          <p class="text-gray-500 text-xs mt-1">2–30 characters. This is what others see.</p>
        </div>

        <!-- Username -->
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1.5">Username</label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm">@</span>
            <input
              type="text"
              placeholder="alice_92"
              class="w-full bg-gray-800 border border-gray-700 text-white placeholder-gray-500 rounded-lg pl-7 pr-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
            />
          </div>
          <p class="text-gray-500 text-xs mt-1">3–50 characters. Letters, digits, underscores only.</p>
        </div>

        <!-- Email -->
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1.5">Email</label>
          <input
            type="email"
            placeholder="alice@example.com"
            class="w-full bg-gray-800 border border-gray-700 text-white placeholder-gray-500 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
          />
          <!-- Field-level error example -->
          <p class="text-red-400 text-xs mt-1 hidden">Email is already taken</p>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1.5">Password</label>
          <input
            type="password"
            placeholder="••••••••"
            class="w-full bg-gray-800 border border-gray-700 text-white placeholder-gray-500 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
          />
          <p class="text-gray-500 text-xs mt-1">Min 8 chars, 1 digit, 1 special character (@$!%*?&)</p>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium rounded-lg py-2.5 text-sm transition mt-2"
        >
          Create account
        </button>

      </form>

    </div>

    <!-- Login link -->
    <p class="text-center text-sm text-gray-500 mt-6">
      Already have an account?
      <a href="login.html" class="text-indigo-400 hover:text-indigo-300 font-medium transition">Sign in</a>
    </p>

  </div>

</body>
</html>
