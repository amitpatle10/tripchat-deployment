<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TripChat — Leave Group</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 h-screen flex overflow-hidden font-sans text-sm">

  <!-- ─── BACKGROUND (dimmed) ──────────────────────────────────────── -->
  <aside class="w-72 bg-gray-900 border-r border-gray-800 flex flex-col shrink-0 opacity-40 pointer-events-none select-none">
    <div class="px-4 py-4 border-b border-gray-800 flex items-center gap-2">
      <div class="w-7 h-7 rounded-lg bg-indigo-600 flex items-center justify-center">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
        </svg>
      </div>
      <span class="text-white font-semibold">TripChat</span>
    </div>
    <div class="px-4 py-3"><span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Your groups</span></div>
    <nav class="flex-1 px-2 space-y-0.5">
      <div class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl bg-gray-800">
        <div class="w-9 h-9 rounded-xl bg-indigo-500 flex items-center justify-center text-white font-semibold shrink-0">P</div>
        <div class="flex-1 min-w-0">
          <p class="text-white font-medium truncate">Paris Trip 2025</p>
          <p class="text-gray-400 text-xs truncate">Alice: See you at the Louvre!</p>
        </div>
      </div>
    </nav>
  </aside>
  <main class="flex-1 bg-gray-950 opacity-40 pointer-events-none select-none"></main>

  <!-- ─── MODAL ─────────────────────────────────────────────────────── -->
  <div class="absolute inset-0 bg-black/60 flex items-center justify-center z-10 p-4">
    <div class="bg-gray-900 border border-gray-800 rounded-2xl w-full max-w-sm shadow-2xl">

      <!-- Icon + Title -->
      <div class="px-6 pt-6 pb-4 text-center">
        <div class="w-12 h-12 rounded-full bg-red-500/15 flex items-center justify-center mx-auto mb-4">
          <svg class="w-6 h-6 text-red-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
        </div>
        <h2 class="text-white font-semibold text-base mb-1">Leave Paris Trip 2025?</h2>
        <p class="text-gray-400 text-sm leading-relaxed">
          You'll lose access to the group and all its messages. You can rejoin later using an invite code.
        </p>
      </div>

      <!-- Actions -->
      <div class="px-6 pb-6 flex items-center gap-3">
        <button type="button" class="flex-1 bg-gray-800 hover:bg-gray-700 text-gray-300 font-medium rounded-lg py-2.5 text-sm transition">
          Cancel
        </button>
        <button type="button" class="flex-1 bg-red-600 hover:bg-red-500 text-white font-medium rounded-lg py-2.5 text-sm transition">
          Leave group
        </button>
      </div>

    </div>
  </div>

</body>
</html>
