<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TripChat — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 min-h-screen flex items-center justify-center font-sans">

  <div class="w-full max-w-sm px-4">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-12 h-12 rounded-2xl bg-indigo-600 mb-4">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">TripChat</h1>
      <p class="text-gray-400 text-sm mt-1">Plan trips with your group</p>
    </div>

    <!-- Card -->
    <div class="bg-gray-900 rounded-2xl p-8 border border-gray-800">

      <h2 class="text-lg font-semibold text-white mb-6">Welcome back</h2>

      <form class="space-y-4">

        <!-- Email -->
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1.5">Email</label>
          <input
            type="email"
            placeholder="alice@example.com"
            class="w-full bg-gray-800 border border-gray-700 text-white placeholder-gray-500 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
          />
        </div>

        <!-- Password -->
        <div>
          <div class="flex items-center justify-between mb-1.5">
            <label class="block text-sm font-medium text-gray-300">Password</label>
          </div>
          <input
            type="password"
            placeholder="••••••••"
            class="w-full bg-gray-800 border border-gray-700 text-white placeholder-gray-500 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
          />
        </div>

        <!-- Error state (hidden by default, shown for demo) -->
        <div class="flex items-center gap-2 bg-red-500/10 border border-red-500/20 rounded-lg px-3 py-2.5 hidden">
          <svg class="w-4 h-4 text-red-400 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" />
          </svg>
          <p class="text-red-400 text-sm">Invalid email or password</p>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium rounded-lg py-2.5 text-sm transition mt-2"
        >
          Sign in
        </button>

      </form>

    </div>

    <!-- Register link -->
    <p class="text-center text-sm text-gray-500 mt-6">
      Don't have an account?
      <a href="register.html" class="text-indigo-400 hover:text-indigo-300 font-medium transition">Create one</a>
    </p>

  </div>

</body>
</html>
