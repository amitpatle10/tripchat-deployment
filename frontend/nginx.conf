server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── SPA Routing ─────────────────────────────────────────────────────────────
    # React Router handles client-side routing. Without this, refreshing on a
    # non-root path (e.g. /groups/42) returns 404 from Nginx.
    # try_files: serve the exact file → directory → fallback to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static Asset Caching ─────────────────────────────────────────────────────
    # Vite hashes asset filenames on build (e.g. main.a1b2c3.js).
    # It is safe to cache these forever — a new deploy produces new hashes.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Reverse Proxy: REST API ──────────────────────────────────────────────────
    # Proxies /api/* to the backend container.
    # In production, backend hostname is resolved via Docker's internal DNS.
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Reverse Proxy: WebSocket (STOMP over SockJS) ─────────────────────────────
    # WebSocket upgrades require explicit Connection/Upgrade headers.
    # SockJS falls back to HTTP long-polling if WS is unavailable — both work here.
    location /ws {
        proxy_pass          http://backend:8080;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        "upgrade";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout  3600s;  # keep WS connections alive for 1h
        proxy_send_timeout  3600s;
    }

    # ── Security Headers ─────────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin" always;

    # ── Gzip Compression ─────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
}
